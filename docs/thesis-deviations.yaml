      Replay-map contract is now produced/validated in presolution and consumed
      in Phi/Omega under a strict runtime no-repair policy: bridge handling only
      validates/passes through producer-normalized mappings, and source-space
      replay targets are hard-rejected with fail-fast diagnostics.
    date: 2026-02-27


