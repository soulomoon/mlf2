name: thesis-conformance

on:
  pull_request:
  push:

jobs:
  build-and-test:
    name: Build & Test (${{ matrix.os }} / GHC ${{ matrix.ghc }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest]
        ghc: ['9.12.2']

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Haskell
        uses: haskell-actions/setup@v2
        with:
          ghc-version: ${{ matrix.ghc }}
          enable-stack: false

      - name: Update package index
        run: cabal update

      - name: Build all targets
        run: cabal build all

      - name: Run test suite
        run: cabal test

  thesis-conformance:
    name: Thesis Conformance Gate (${{ matrix.os }} / GHC ${{ matrix.ghc }})
    needs: [build-and-test]
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest]
        ghc: ['9.12.2']

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Haskell
        uses: haskell-actions/setup@v2
        with:
          ghc-version: ${{ matrix.ghc }}
          enable-stack: false

      - name: Update package index
        run: cabal update

      - name: Build all targets
        run: cabal build all

      - name: Run thesis conformance anchors
        run: ./scripts/thesis-conformance-gate.sh
